name: Update Destiny Manifest

on:
  schedule:
    - cron: "0 17 * * 2"
  workflow_dispatch:

concurrency:
  group: update-destiny-manifest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to latest remote master
        run: |
          git fetch origin master
          git checkout -B master origin/master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download static manifest
        run: node scripts/update-static-manifest.mjs

      - name: Commit and push manifest changes
        run: |
          set -euxo pipefail

          if git diff --quiet -- data/destiny-manifest; then
            echo "Manifest is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/destiny-manifest
          git commit -m "Update Destiny manifest"

          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt}: fetching and rebasing onto origin/master..."
            git fetch origin master
            git rebase origin/master

            echo "Push attempt ${attempt}: pushing to origin/master..."
            if git push origin master; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi

            echo "Push failed on attempt ${attempt}, retrying in 3 seconds..."
            sleep 3
          done

          echo "Failed to push manifest update after 5 attempts."
          exit 1
