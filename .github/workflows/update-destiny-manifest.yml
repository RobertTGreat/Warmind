name: Update Destiny Manifest

on:
  schedule:
    - cron: "0 17 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download static manifest
        run: node scripts/update-static-manifest.mjs

      - name: Commit manifest changes
        run: |
          if git diff --quiet -- data/destiny-manifest; then
            echo "Manifest is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/destiny-manifest
          git commit -m "Update Destiny manifest"
          git push
